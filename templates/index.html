<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insta Reel Downloader</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding-top: 50px; }
        .main-card { max-width: 450px; margin: auto; background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .preview-container { margin-top: 25px; border-radius: 15px; overflow: hidden; border: 1px solid #eee; background: #fafafa; }
        video { width: 100%; border-radius: 10px; }
        #loading-section { display: none; margin-top: 20px; }
        .btn-custom { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); color: white; border: none; font-weight: bold; }
        .btn-custom:hover { color: white; opacity: 0.9; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-card text-center">
        <h3 class="mb-4">Instagram Downloader</h3>
        
        <form id="download-form" method="POST">
            <div class="mb-3">
                <input type="text" name="url" id="video-url" class="form-control" placeholder="Paste Reel Link Here..." required>
            </div>
            <button type="submit" class="btn btn-custom w-100" id="submit-btn">
                <span id="btn-text">Get Video</span>
            </button>
        </form>

        <div id="loading-section">
            <div class="spinner-border text-danger" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2 text-muted">Fetching your video, please wait...</p>
        </div>

        {% if video_url %}
        <div id="preview-section" class="preview-container p-2">
            <h6 class="text-muted mb-2">Preview</h6>
            <video controls id="player">
                <source src="{{ video_url }}" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <div class="mt-3">
                <a href="{{ video_url }}" target="_blank" class="btn btn-success w-100 mb-2" download>Download Now</a>
            </div>
        </div>
        {% endif %}
    </div>
</div>

<script>
    const form = document.getElementById('download-form');
    const loadingSection = document.getElementById('loading-section');
    const submitBtn = document.getElementById('submit-btn');
    const previewSection = document.getElementById('preview-section');

    form.onsubmit = function() {
        // Form submit hote hi spinner dikhao aur purana preview chhupao
        loadingSection.style.display = 'block';
        submitBtn.disabled = true;
        if (previewSection) {
            previewSection.style.display = 'none';
        }
    };
</script>

</body>
</html>
