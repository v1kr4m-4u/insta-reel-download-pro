<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Insta Reel Downloader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%,#d6249f 60%,#285AEB 90%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            padding-top: 20px;
        }

        /* Donate Section (Top Right) */
        .donate-section {
            position: absolute;
            top: 15px;
            right: 15px;
            text-align: center;
            z-index: 100;
        }
        .donate-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }
        .donate-btn:hover {
            background: white;
            color: #dc2743;
        }

        /* Hidden QR Card */
        .qr-card {
            display: none;
            position: absolute;
            top: 55px;
            right: 0;
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 180px;
        }
        .qr-card img {
            width: 100%;
            border-radius: 10px;
        }
        .qr-card p {
            font-size: 0.8rem;
            margin-top: 10px;
            color: #333;
            font-weight: 600;
        }

        .card { 
            border-radius: 20px; 
            border: none; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            margin-top: 80px; 
            background: #fff;
        }

        .logo-section { text-align: center; margin-bottom: 25px; }
        .logo-section img { width: 60px; margin-bottom: 10px; }
        .logo-section h3 {
            font-weight: 700;
            background: -webkit-linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .insta-btn { 
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); 
            color: white; border: none; font-weight: bold; padding: 12px; border-radius: 10px;
        }
        
        #loading-section { display: none; margin-top: 25px; text-align: center; }
        video { width: 100%; border-radius: 15px; margin-top: 20px; border: 2px solid #efefef; }
    </style>
</head>
<body>

<div class="donate-section">
    <button class="donate-btn" onclick="toggleQR()">❤️ Donate</button>
    <div class="qr-card" id="qrCard">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=9823714470@nyes&pn=InstaDownloader&cu=INR" alt="QR">
        <p>Scan to Support!</p>
    </div>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4">
                <div class="logo-section">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="Logo">
                    <h3>Reel Downloader</h3>
                </div>
                
                <form id="instaForm" method="POST">
                    <div class="mb-3">
                        <input type="text" name="url" class="form-control" placeholder="Reel link paste karein..." required>
                    </div>
                    <button type="submit" id="submitBtn" class="btn insta-btn w-100">Video Nikalein</button>
                </form>

                <div id="loading-section">
                    <div class="spinner-border text-danger" role="status"></div>
                    <p class="mt-2 text-muted">Taiyaar ho raha hai...</p>
                </div>

                {% if video_url %}
                <div id="preview-box">
                    <video controls autoplay muted loop>
                        <source src="{{ video_url }}" type="video/mp4">
                    </video>
                    <div class="mt-3">
                        <a href="{{ video_url }}" class="btn btn-primary w-100" style="background-color: #0095f6; border:none;" download>Download Now</a>
                    </div>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>

<script>
    function toggleQR() {
        const qr = document.getElementById('qrCard');
        qr.style.display = (qr.style.display === 'block') ? 'none' : 'block';
    }

    const form = document.getElementById('instaForm');
    form.onsubmit = function() {
        document.getElementById('loading-section').style.display = 'block';
        document.getElementById('submitBtn').disabled = true;
        if(document.getElementById('preview-box')) document.getElementById('preview-box').style.display = 'none';
    };
</script>

</body>
</html>
