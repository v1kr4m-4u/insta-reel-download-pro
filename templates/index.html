<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaReels Pro | Download HD</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
            padding: 20px;
        }

        /* Donate Button Styling */
        .donate-box {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .btn-donate {
            background: #ffc107;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .btn-donate:hover { transform: translateY(-3px); background: #fff; }

        /* Main Container */
        .main-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .insta-icon { font-size: 60px; color: #e1306c; margin-bottom: 15px; }
        
        h1 { font-size: 26px; color: #333; margin-bottom: 5px; }
        .sub-text { color: #777; font-size: 14px; margin-bottom: 30px; }

        .input-area { position: relative; margin-bottom: 20px; }
        
        input {
            width: 100%;
            padding: 15px 15px 15px 50px;
            border: 2px solid #ddd;
            border-radius: 15px;
            outline: none;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus { border-color: #e1306c; }

        .input-area i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #e1306c;
            font-size: 20px;
        }

        .fetch-btn {
            width: 100%;
            padding: 15px;
            background: #e1306c;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .fetch-btn:hover { background: #c13584; box-shadow: 0 5px 15px rgba(225, 48, 108, 0.4); }

        /* QR Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center; align-items: center;
            z-index: 200;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            position: relative;
        }

        .close-qr {
            position: absolute;
            top: 10px; right: 20px;
            font-size: 30px; cursor: pointer;
        }

        .upi-text {
            background: #eee;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            margin-top: 10px;
            display: inline-block;
        }

        /* Result Area */
        .result { margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px; }
        .download-now {
            display: inline-block;
            background: #28a745;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 600;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="donate-box">
        <button class="btn-donate" onclick="showQR()">
            <i class="fas fa-coffee"></i> Donate
        </button>
    </div>

    <div id="upiModal" class="modal">
        <div class="modal-content">
            <span class="close-qr" onclick="closeQR()">&times;</span>
            <h3 style="margin-bottom: 10px;">Support Me!</h3>
            <p style="font-size: 14px; margin-bottom: 15px;">Scan to send any amount</p>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=9823714470@nyes&pn=Deepika&cu=INR" alt="UPI QR">
            <br>
            <div class="upi-text">UPI: 9823714470@nyes</div>
        </div>
    </div>

    <div class="main-card">
        <div class="insta-icon"><i class="fab fa-instagram-square"></i></div>
        <h1>Reels Downloader</h1>
        <p class="sub-text">Download Instagram Reels in seconds!</p>

        <form method="POST">
            <div class="input-area">
                <i class="fas fa-link"></i>
                <input type="text" name="url" placeholder="Paste link here..." required>
            </div>
            <button type="submit" class="fetch-btn">Download Now</button>
        </form>

        {% if error %}
            <p style="color: red; margin-top: 15px;"><i class="fas fa-exclamation-triangle"></i> {{ error }}</p>
        {% endif %}

        {% if video_link %}
            <div class="result">
                <p style="color: #28a745; font-weight: 600;">🎉 Video Found!</p>
                <a href="{{ video_link }}" class="download-now" target="_blank" download>
                    <i class="fas fa-cloud-download-alt"></i> Click to Download
                </a>
            </div>
        {% endif %}
    </div>

    <script>
        function showQR() { document.getElementById("upiModal").style.display = "flex"; }
        function closeQR() { document.getElementById("upiModal").style.display = "none"; }
    </script>

</body>
</html>
